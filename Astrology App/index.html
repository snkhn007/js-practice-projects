<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Astrology Insights</h1>
        </div>
        <div class="form">
            <form action="" name="Myform" id="Myform">
                <div class="inp fname">
                    <label>
                        First Name:
                        <br>
                        <input type="text" name="fName" id="">
                        <br>
                        <div class="errf err"></div>
                    </label>
                </div>
                <div class="inp sname">
                    <label>
                        Last Name:
                        <br>
                        <input type="text" name="sName" id="">
                        <br>
                        <div class="errs err"></div>
                    </label>
                </div>
                <div class="inp date">
                    <label>
                        Day:
                        <br>
                        <input type="text" name="Day" id="">
                        <br>
                        <div class="errDay err"></div>
                    </label>
                </div>
                <div class="inp day">
                    <label>
                        Month:
                        <br>
                        <input type="text" name="Month" id="">
                        <br>
                        <div class="errMonth err"></div>
                    </label>
                </div>
                <div class="inp year">
                    <label>
                        Year:
                        <br>
                        <input type="text" name="Year" id="">
                        <br>
                        <div class="errYear err"></div>
                    </label>
                </div>
                <div class="inp btn">
                    <button>Get Insights</button>
                </div>
            </form>
        </div>
        <div id="res"></div>
    </div>
</body>
</html>
