<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>
</head>
<body>
    <div class="quizForm">
        <div class="heading">
            <h2>JavaScript Quiz</h2>
        </div>
        <form action="" id="myForm">
            <div class="field">
                <p>1. Which JavaScript feature is mainly used to handle asynchronous code?</p>
                <label>
                    <input type="radio" name="q1" value="for">
                    for loop                    
                </label>
                <br>
                <label>
                    <input type="radio" name="q1" value="async">
                    async / await                   
                </label>
                <br>
                <label>
                    <input type="radio" name="q1" value="switch">
                    switch                    
                </label>
                <br>
                <label>
                    <input type="radio" name="q1" value="template">
                    template strings                   
                </label>
            </div>
            <div class="field">
                <p>2. Which HTTP method is usually used to create new data?</p>
                <label>
                    <input type="radio" name="q2" value="get">
                    GET                    
                </label>
                <br>
                <label>
                    <input type="radio" name="q2" value="delete">
                    DELETE                  
                </label>
                <br>
                <label>
                    <input type="radio" name="q2" value="post">
                    POST                   
                </label>
                <br>
                <label>
                    <input type="radio" name="q2" value="patch">
                    PATCH                   
                </label>
            </div>
            <div class="field">
                <p>3. Which command is used to install a package in a Node project?</p>
                <label>
                    <input type="radio" name="q3" value="node">
                    node install                   
                </label>
                <br>
                <label>
                    <input type="radio" name="q3" value="add">
                    npm add                  
                </label>
                <br>
                <label>
                    <input type="radio" name="q3" value="install">
                    npm install                 
                </label>
                <br>
                <label>
                    <input type="radio" name="q3" value="get">
                    node get               
                </label>
            </div>

            <div class="btn">
                <button>Submit</button>
            </div>

        </form>

    </div>
    
</body>
</html>
